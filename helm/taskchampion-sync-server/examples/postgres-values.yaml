sqlite:
  enabled: false

postgres:
  enabled: true
  database: taskchampion
  host: postgres-primary
  username: taskchampion-user

clientIdSecret: "taskchampion-client-ids"

env:
  - name: RUST_LOG
    value: debug
  - name: LISTEN
    value: "0.0.0.0:8080"
  - name: CREATE_CLIENTS
    value: "false"

replicas:
  enabled: true
  count: 3

image:
  pullSecrets:
    - name: my-registry-secret

httpRoute:
  enabled: true
  gateway: "my-gateway"
  host: "taskchampion.example.com"
  path: "/"
  port: 8080
