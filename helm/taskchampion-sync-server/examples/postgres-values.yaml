sqlite:
  enabled: false

postgres:
  enabled: true
  database: taskchampion
  host: postgres-primary
  username: taskchampion-user

clientIdSecret: "taskchampion-client-ids"

env:
  RUST_LOG: debug
  LISTEN: "0.0.0.0:8080"
  CREATE_CLIENTS: "false"

replicas:
  enabled: true
  count: 3

image:
  pullSecrets:
    - my-registry-secret

httpRoute:
  enabled: true
  gateway: "my-gateway"
  host: "taskchampion.example.com"
  path: "/"
  port: 8080
